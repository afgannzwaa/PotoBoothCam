<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛰️ Remote Surveillance</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --acc: #00ff9d; --card: #161616; }
        body {
            background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .dashboard {
            width: 95%; max-width: 800px; background: var(--card);
            border-radius: 20px; padding: 25px; border: 1px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .monitor {
            width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px;
            overflow: hidden; border: 2px solid #222; position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        video.on { opacity: 1; }

        .status-bar {
            display: flex; justify-content: space-between; margin-bottom: 15px;
            font-size: 12px; color: var(--acc); text-transform: uppercase;
        }

        .input-box {
            margin-top: 25px; display: flex; gap: 10px;
        }

        input {
            flex: 1; background: #000; border: 1px solid #333; padding: 15px;
            border-radius: 10px; color: var(--acc); outline: none; font-family: inherit;
        }

        button {
            background: var(--acc); color: #000; border: none; padding: 0 25px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #00cc7d; box-shadow: 0 0 15px rgba(0,255,157,0.4); }

        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,255,157,0.02) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="status-bar">
            <span>● LIVE_FEED_RECEIVER</span>
            <span id="stat">IDLE</span>
        </div>

        <div class="monitor">
            <div class="scanline"></div>
            <video id="rv" autoplay playsinline></video>
        </div>

        <div class="input-box">
            <input type="text" id="tid" placeholder="ENTER BOOTH_ID">
            <button onclick="conn()">LINK</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        const rv = document.getElementById('rv');
        const stat = document.getElementById('stat');

        window.onload = () => {
            const last = localStorage.getItem('last_id');
            if (last) { document.getElementById('tid').value = last; setTimeout(conn, 2000); }
        };

        function conn() {
            const id = document.getElementById('tid').value;
            if (!id) return;
            stat.innerText = "CONNECTING...";
            localStorage.setItem('last_id', id);
            
            const call = peer.call(id, null);
            call.on('stream', s => {
                rv.srcObject = s; rv.classList.add('on');
                stat.innerText = "CONNECTED // STREAMING";
            });
            call.on('error', () => { stat.innerText = "ERROR // RETRYING"; });
        }
    </script>
</body>
</html>
